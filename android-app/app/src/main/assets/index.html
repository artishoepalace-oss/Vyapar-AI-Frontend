<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vyapar AI</title>
<meta name="theme-color" content="#071427" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="appLoader" class="video-loader">
  <video
    id="splashVideo"
    class="splash-video"
    autoplay
    muted
    playsinline
    preload="auto"
  >
    <source src="splash.mp4" type="video/mp4">
  </video>

  <div class="splash-bottom-loader">
    <div class="splash-loading">
      <span></span>
    </div>
  </div>
</div>
<div id="tabLoader">
    <div class="tab-loader-card"><div class="tab-loader-dot"></div>
    <div class="tab-loader-text">Loading...</div></div></div>
<div class="app">
<header class="top">
    <div class="brand"><img class="logo" src="logo.png" 
    alt="Vyapar AI logo" onclick="devTap()" title="Vyapar AI"><div>
        <h1>Vyapar AI</h1><div class="tag">Smart Business. Intelligent Growth.</div></div></div>
        <div class="top-actions"><button class="theme-toggle" id="themeToggle" onclick="toggleTheme(event)" type="button">🌙 Dark</button>
        <div class="badge" id="planBadge">Free Plan</div></div></header>
<nav class="nav" id="nav"></nav>
<section id="screen-home" class="screen"></section>
<section id="screen-upload" class="screen hide"></section>
<section id="screen-sales" class="screen hide"></section>
<section id="screen-stock" class="screen hide"></section>
<section id="screen-analytics" class="screen hide"></section>
<section id="screen-calculator" class="screen hide"></section>
<section id="screen-subscription" class="screen hide"></section>
<section id="screen-settings" class="screen hide"></section>
<div class="footer">© Vyapar AI. Business manager for small retailers by Anuj Gupta.</div>
</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="script.js"></script>
</body>

</html>
